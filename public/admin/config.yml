backend:
  name: github
  repo: bhuvi28/mm-earthmovers
  branch: main
  base_url: https://www.mmearthmovers.com
  auth_endpoint: api/auth

local_backend: false
publish_mode: editorial_workflow


media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products"
    folder: "content/products"
    create: true
    slug: "{{part_number}}-{{title}}"
    summary: '{{category}}: {{title}} (Part #{{part_number}})'
    sortable_fields: ['title', 'priority', 'category', 'date']
    view_groups:
      - label: Category
        field: category
    view_filters:
      - label: Motor Grader
        field: category
        pattern: Motor Grader
      - label: Loader
        field: category
        pattern: Loader
      - label: Excavator
        field: category
        pattern: Excavator
      - label: Other
        field: category
        pattern: Other
    fields:
      - {label: "Date Added", name: "date", widget: "datetime", required: false}
      - {label: "Part Name", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Motor Grader", "Loader", "Excavator", "Other"]}
      - {label: "Company Name", name: "brand", widget: "select", multiple: true, required: false, options: [
          "HM 2021", "HM 2021 B", "HM 2021 D", "HM 2021 E", "TATA TWL 3036", "L&T 9020",
          "JCB 430Z","JCB 430", "BEML BG 605/511", "BEML BG 605","BEML BG 511",
          "SLDG", "XCMG", "LIUGONG", "JCB 3DX","JCB 430ZX","JCB 432ZX","TATA TWL 340",
          "SLDG 958","SLDG 956","SLDG 936","XCMG ZL50GN"
        ]}
      - {label: "Part Number", name: "part_number", widget: "string", required: false, hint: "Enter part number. For multiple part numbers, separate with ' / ' (e.g., '12345 / 67890')"}
      - {label: "Display Priority", name: "priority", widget: "number", required: false, default: 999, hint: "Lower numbers appear first (e.g., 1, 2, 3). Leave blank or use 999 for alphabetical order."}
      - {label: "Product Image", name: "image", widget: "image", required: false}
      - {label: "Description", name: "body", widget: "markdown", required: false}
